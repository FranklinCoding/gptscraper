services:
  - type: web
    name: gptscraper-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app_main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.19
      - key: POLL_SECONDS
        value: "15"
      - key: BACKFILL_DAYS
        value: "60"
